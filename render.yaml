services:
  - type: web
    name: fakenews-detector
    runtime: python
    buildCommand: pip install -r requirements.txt && python generate_dataset.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "False"
