{% extends "base.html" %}
{% block title %}Error {{ error_code }}{% endblock %}

{% block content %}
<section class="warning-page fade-in">
    <div style="font-size: 4rem; color: var(--accent-amber); margin-bottom: 1rem;">
        <i class="fas fa-exclamation-circle"></i>
    </div>
    <h1 style="color: var(--accent-amber);">Error {{ error_code }}</h1>
    <p>{{ error_msg }}</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
        <i class="fas fa-home"></i> Back to Home
    </a>
</section>
{% endblock %}
