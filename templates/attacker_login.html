{% extends "base.html" %}
{% block title %}Attacker Login{% endblock %}

{% block nav %}
<nav class="navbar">
    <div class="navbar-inner">
        <a href="{{ url_for('index') }}" class="navbar-brand">
            <i class="fas fa-shield-halved"></i>
            <span>FakeNewsML</span>
        </a>
        <ul class="navbar-links">
            <li><a href="{{ url_for('index') }}"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="{{ url_for('search') }}"><i class="fas fa-search"></i> Search</a></li>
        </ul>
    </div>
</nav>
{% endblock %}

{% block content %}
<section class="login-page">
    <div class="form-card login-card fade-in">
        <div class="login-icon attacker">
            <i class="fas fa-skull-crossbones"></i>
        </div>
        <h2>Blocker Login</h2>
        <p class="form-subtitle">Attacker Panel — URL Blocking System</p>
        <form method="POST" action="{{ url_for('attacker_login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="attacker-name"><i class="fas fa-user"></i> Username</label>
                <input type="text" name="name" id="attacker-name" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="attacker-pass"><i class="fas fa-key"></i> Password</label>
                <input type="password" name="pass" id="attacker-pass" placeholder="Enter password" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-danger" id="attacker-login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
